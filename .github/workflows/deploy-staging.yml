name: Deploy (Staging)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-remote:
    name: Staging — prepare server folders
    runs-on: ubuntu-latest
    environment: deploy
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PASS: ${{ secrets.SSH_PASS }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      REMOTE_ROOT: ${{ secrets.SSH_PATH }}
      SSH_OPTS: >-
        -o StrictHostKeyChecking=no
        -o HostKeyAlgorithms=+ssh-rsa
        -o PubkeyAcceptedAlgorithms=+ssh-rsa
        -o PreferredAuthentications=password,keyboard-interactive
        -o PubkeyAuthentication=no
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Validate SSH secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SSH_HOST:-}" || (echo "Missing SSH_HOST secret" && exit 1)
          test -n "${SSH_USER:-}" || (echo "Missing SSH_USER secret" && exit 1)
          test -n "${SSH_PASS:-}" || (echo "Missing SSH_PASS secret (Environment 'deploy'?)" && exit 1)
          test -n "${SSH_PORT:-}" || (echo "Missing SSH_PORT secret" && exit 1)
          test -n "${REMOTE_ROOT:-}" || (echo "Missing SSH_PATH secret (REMOTE_ROOT)" && exit 1)

      - name: Create docroots and clear SPA targets
        shell: bash
        run: |
          set -euo pipefail
          REMOTE_Q="$(printf '%q' "$REMOTE_ROOT")"
          sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" $SSH_OPTS "$SSH_USER@$SSH_HOST" \
            "bash -lc 'REMOTE_ROOT=$REMOTE_Q; mkdir -p \"\$REMOTE_ROOT/staging\" \"\$REMOTE_ROOT/staging-api\" \"\$REMOTE_ROOT/staging-dashboard\" && find \"\$REMOTE_ROOT/staging\" -mindepth 1 -maxdepth 1 -exec rm -rf {} + && find \"\$REMOTE_ROOT/staging-dashboard\" -mindepth 1 -maxdepth 1 -exec rm -rf {} +'"

  staging-site:
    name: Staging — site (build + upload)
    runs-on: ubuntu-latest
    environment: deploy
    needs: prepare-remote
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PASS: ${{ secrets.SSH_PASS }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      REMOTE_ROOT: ${{ secrets.SSH_PATH }}
      SSH_OPTS: >-
        -o StrictHostKeyChecking=no
        -o HostKeyAlgorithms=+ssh-rsa
        -o PubkeyAcceptedAlgorithms=+ssh-rsa
        -o PreferredAuthentications=password,keyboard-interactive
        -o PubkeyAuthentication=no
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: roure/package-lock.json

      - name: Install deps (roure)
        working-directory: roure
        run: npm ci

      - name: Build site (staging)
        working-directory: roure
        run: npm run build -- --configuration=staging

      - name: Ensure build output exists
        working-directory: roure
        run: test -d dist/rourepersonaltraining/browser

      - name: Add Apache SPA .htaccess
        working-directory: roure
        run: cp src/.htaccess dist/rourepersonaltraining/browser/.htaccess

      - name: Site deep-link fallbacks
        working-directory: roure
        run: |
          set -euo pipefail
          ROOT="dist/rourepersonaltraining/browser"
          for p in about-us methods blog programs free-intake \
                   programs/weight-loss-muscle-mass programs/peak-performance programs/vitality-longevity programs/prenatal-postpartum; do
            mkdir -p "$ROOT/$p"
            cp "$ROOT/index.html" "$ROOT/$p/index.html"
          done

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload site to staging/ (REMOTE_ROOT/staging)
        run: >
          sshpass -p "$SSH_PASS" scp
          -O
          -P "$SSH_PORT"
          $SSH_OPTS
          -r roure/dist/rourepersonaltraining/browser/*
          "$SSH_USER@$SSH_HOST:$REMOTE_ROOT/staging/"

  staging-dashboard:
    name: Staging — dashboard (build + upload)
    runs-on: ubuntu-latest
    environment: deploy
    needs: prepare-remote
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PASS: ${{ secrets.SSH_PASS }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      REMOTE_ROOT: ${{ secrets.SSH_PATH }}
      SSH_OPTS: >-
        -o StrictHostKeyChecking=no
        -o HostKeyAlgorithms=+ssh-rsa
        -o PubkeyAcceptedAlgorithms=+ssh-rsa
        -o PreferredAuthentications=password,keyboard-interactive
        -o PubkeyAuthentication=no
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install deps (dashboard)
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard (staging)
        working-directory: dashboard
        run: npm run build -- --configuration=staging

      - name: Ensure dashboard build exists
        working-directory: dashboard
        run: test -f dist/dashboard/browser/index.html

      - name: Add Apache SPA .htaccess
        working-directory: dashboard
        run: cp src/.htaccess dist/dashboard/browser/.htaccess

      - name: Dashboard deep-link fallbacks
        working-directory: dashboard
        run: |
          set -euo pipefail
          ROOT="dist/dashboard/browser"
          for p in login posts posts/new categories users users/new advanced/json; do
            mkdir -p "$ROOT/$p"
            cp "$ROOT/index.html" "$ROOT/$p/index.html"
          done

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload dashboard to staging-dashboard/
        run: >
          sshpass -p "$SSH_PASS" scp
          -O
          -P "$SSH_PORT"
          $SSH_OPTS
          -r dashboard/dist/dashboard/browser/*
          "$SSH_USER@$SSH_HOST:$REMOTE_ROOT/staging-dashboard/"

  staging-api:
    name: Staging — API (upload PHP)
    runs-on: ubuntu-latest
    environment: deploy
    needs: prepare-remote
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PASS: ${{ secrets.SSH_PASS }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      REMOTE_ROOT: ${{ secrets.SSH_PATH }}
      SSH_OPTS: >-
        -o StrictHostKeyChecking=no
        -o HostKeyAlgorithms=+ssh-rsa
        -o PubkeyAcceptedAlgorithms=+ssh-rsa
        -o PreferredAuthentications=password,keyboard-interactive
        -o PubkeyAuthentication=no
    steps:
      - uses: actions/checkout@v6

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload backend to staging-api/
        shell: bash
        run: |
          set -euo pipefail
          sshpass -p "$SSH_PASS" scp -O -P "$SSH_PORT" $SSH_OPTS backend/index.php "$SSH_USER@$SSH_HOST:$REMOTE_ROOT/staging-api/index.php"
          sshpass -p "$SSH_PASS" scp -O -P "$SSH_PORT" $SSH_OPTS backend/.htaccess "$SSH_USER@$SSH_HOST:$REMOTE_ROOT/staging-api/.htaccess"

          upload_if_absent() {
            local name="$1"
            if sshpass -p "$SSH_PASS" ssh -p "$SSH_PORT" $SSH_OPTS "$SSH_USER@$SSH_HOST" \
                "[ -f \"${REMOTE_ROOT}/staging-api/${name}\" ]"; then
              echo "staging-api/${name} already present — skip"
            else
              echo "staging-api/${name} missing — uploading"
              sshpass -p "$SSH_PASS" scp -O -P "$SSH_PORT" $SSH_OPTS \
                "backend/${name}" "$SSH_USER@$SSH_HOST:$REMOTE_ROOT/staging-api/${name}"
            fi
          }
          upload_if_absent router.php
          upload_if_absent content.json
